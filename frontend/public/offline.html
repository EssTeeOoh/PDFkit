<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>PDFKit Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0f;
        --panel: #12121a;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f4f1ff;
        --muted: #a7a3bf;
        --accent: #7b6cff;
        --accent2: #ff6c8a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(123, 108, 255, 0.2), transparent 35%),
          linear-gradient(180deg, #09090d, var(--bg));
        color: var(--text);
        font-family: system-ui, sans-serif;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(18, 18, 26, 0.96), rgba(24, 24, 34, 0.96));
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        padding: 32px;
      }

      .badge {
        display: inline-grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 15px;
      }

      code {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">PK</div>
      <h1>PDFKit is offline.</h1>
      <p>The app shell could not reach the network, so this offline fallback page was shown instead.</p>
      <p>Once you reconnect, reopen PDFKit. </p>
    </main>
  </body>
  </html>
